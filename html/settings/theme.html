<div id="ch-tab-theme">
    <div class="st-chatu8-settings-section">
        <h3>Cài đặt giao diện</h3>
        <div class="st-chatu8-field">
            <label for="theme_id">Preset giao diện</label>
            <div class="st-chatu8-profile-controls">
                <select id="theme_id" class="st-chatu8-select"></select>
                <button class="st-chatu8-icon-btn" id="theme_save_style" title="Lưu"><i class="fa-solid fa-save"></i></button>
                <button class="st-chatu8-icon-btn" id="theme_export_current" title="Xuất hiện tại"><i class="fa-solid fa-upload"></i></button>
                <button class="st-chatu8-icon-btn" id="theme_export_all" title="Xuất tất cả"><i class="fa-solid fa-file-export"></i></button>
                <button class="st-chatu8-icon-btn" id="theme_import" title="Nhập"><i class="fa-solid fa-download"></i></button>
                <button class="st-chatu8-icon-btn danger" id="theme_delete_style" title="Xóa"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="theme_generate_btn_style">Kiểu nút tạo</label>
            <select id="theme_generate_btn_style" class="st-chatu8-select">
                <option value="默认">Mặc định</option>
                <option value="渐变-蓝紫">Gradient xanh tím</option>
                <option value="渐变-橙红">Gradient cam đỏ</option>
                <option value="科技霓虹">Neon công nghệ</option>
                <option value="极简黑白">Tối giản đen trắng</option>
                <option value="玻璃拟态">Kính mờ</option>
                <option value="少女心">Nét thiếu nữ</option>
                <option value="森林系">Phong cách rừng</option>
                <option value="星空紫">Tím trời sao</option>
                <option value="魔法图标">Icon phép thuật</option>
                <option value="赛博几何">Hình học cyber</option>
                <option value="手绘风格">Phong cách vẽ tay</option>
                <option value="极简文字">Chữ tối giản</option>
                <option value="冰封水晶">Pha lê băng giá</option>
                <option value="流光宝石">Đá quý ánh sáng</option>
                <option value="悬浮胶囊">Viên nang nổi</option>
                <option value="全息立方">Khối toàn ảnh</option>
                <option value="赛博方块">Khối cyber</option>
                <option value="森林图标">Icon rừng</option>
                <option value="少女图标">Icon thiếu nữ</option>
                <option value="星空图标">Icon trời sao</option>
                <option value="霓虹图标">Icon neon</option>
                <option value="宝石图标">Icon đá quý</option>
                <option value="原木质感">Chất gỗ tự nhiên</option>
                <option value="云朵白">Trắng mây</option>
                <option value="水流蓝">Xanh dòng nước</option>
            </select>
        </div>
        <div class="st-chatu8-field">
            <label for="theme_image_frame_style">Kiểu khung ảnh</label>
            <select id="theme_image_frame_style" class="st-chatu8-select">
                <option value="无样式">Không kiểu</option>
                <option value="简约白边">Viền trắng giản lược</option>
                <option value="柔和阴影">Bóng đổ mềm</option>
                <option value="圆角相框">Khung bo tròn</option>
                <option value="复古画框">Khung cổ điển</option>
                <option value="科技边框">Viền công nghệ</option>
                <option value="霓虹光晕">Quầng sáng neon</option>
                <option value="玻璃质感">Chất kính</option>
                <option value="渐变边框">Viền gradient</option>
                <option value="金色画框">Khung vàng</option>
                <option value="极简线条">Đường nét tối giản</option>
                <option value="浮雕效果">Hiệu ứng phù điêu</option>
                <option value="漫画风格">Phong cách truyện tranh</option>
                <option value="胶片边框">Viền phim</option>
            </select>
        </div>
        <div class="st-chatu8-field">
            <label for="theme_collapse_style">Kiểu khung thu gọn</label>
            <select id="theme_collapse_style" class="st-chatu8-select">
                <option value="默认">Mặc định</option>
                <option value="极简线条">Đường nét tối giản</option>
                <option value="科技霓虹">Neon công nghệ</option>
                <option value="玻璃质感">Chất kính</option>
                <option value="暖色温馨">Ấm áp ấm cúng</option>
                <option value="森林绿意">Xanh rừng</option>
                <option value="少女粉彩">Phấn màu thiếu nữ</option>
                <option value="星空紫">Tím trời sao</option>
            </select>
        </div>
        <div id="theme-color-pickers" class="st-chatu8-grid">
            <!-- Bộ chọn màu sẽ được chèn động tại đây -->
        </div>
    </div>
</div>
