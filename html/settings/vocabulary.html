<div id="ch-tab-vocabulary">
    <div class="st-chatu8vi-settings-section">
        <h3>Quản lý từ điển</h3>
        <div class="st-chatu8vi-field">
            <label>Thao tác hàng loạt</label>
            <div>
                <button id="vocabulary-install-all-btn" class="st-chatu8vi-btn">Cài tất cả</button>
                <button id="vocabulary-uninstall-all-btn" class="st-chatu8vi-btn danger">Gỡ tất cả</button>
            </div>
        </div>
        <div class="st-chatu8vi-field-col">
            <label>Từ điển khả dụng (trên điện thoại cài 3-4 cái là đủ)</label>
            <div id="vocabulary-file-list" class="st-chatu8vi-vocabulary-list"></div>
        </div>
    </div>
    <div class="st-chatu8vi-settings-section">
        <h3>Trình duyệt tag</h3>
        <div class="st-chatu8vi-field-col">
            <textarea id="vocabulary-selected-tags" class="st-chatu8vi-textarea" rows="3" placeholder="Bấm vào các tag bên dưới sẽ được thêm vào đây..."></textarea>
            <div class="st-chatu8vi-tag-browser-actions">
                <button id="vocabulary-tag-backspace" class="st-chatu8vi-btn">Lùi lại</button>
                <button id="vocabulary-tag-clear" class="st-chatu8vi-btn danger">Xóa sạch</button>
                <button id="vocabulary-tag-copy" class="st-chatu8vi-btn">Sao chép</button>
            </div>
        </div>
        <div id="vocabulary-tree-container" class="st-chatu8vi-tree-container"></div>
    </div>
    <div class="st-chatu8vi-settings-section">
        <h3>Quản lý tag thủ công</h3>
        <div class="st-chatu8vi-field-col" style="gap: 10px;">
            <label>Thêm tag mới</label>
            <div class="st-chatu8vi-input-group" style="flex-wrap: wrap;">
                <input type="text" id="vocabulary-manual-tag-original-input" class="st-chatu8vi-text-input" placeholder="Tag gốc..." style="min-width: 120px; flex: 1;">
                <input type="text" id="vocabulary-manual-tag-translation-input" class="st-chatu8vi-text-input" placeholder="Dịch tag..." style="min-width: 120px; flex: 1;">
                <button id="vocabulary-manual-tag-add-btn" class="st-chatu8vi-btn">Thêm</button>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label>Thao tác</label>
            <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                <button id="vocabulary-manual-tags-refresh-btn" class="st-chatu8vi-btn">Làm mới danh sách</button>
                <button id="vocabulary-manual-tags-export-btn" class="st-chatu8vi-btn">Xuất</button>
                <button id="vocabulary-manual-tags-import-btn" class="st-chatu8vi-btn">Nhập</button>
                <input type="file" id="vocabulary-manual-tags-import-input" accept=".json" style="display: none;">
            </div>
        </div>
        <div class="st-chatu8vi-field-col">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">
                <label style="min-width: 120px;">Tag đã thêm thủ công</label>
                <input type="text" id="vocabulary-manual-tags-filter-input" class="st-chatu8vi-text-input" placeholder="Lọc tag..." style="flex: 1; min-width: 150px; max-width: 300px;">
            </div>
            <div id="vocabulary-manual-tags-list" class="st-chatu8vi-vocabulary-list" style="max-height: 200px; overflow-y: auto;"></div>
        </div>
    </div>
    <div class="st-chatu8vi-settings-section">
        <h3>Cài đặt tìm kiếm</h3>
        <div class="st-chatu8vi-field">
            <label for="vocabulary_search_startswith">Khớp đầu</label>
            <div class="st-chatu8vi-toggle">
                <input id="vocabulary_search_startswith" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label for="vocabulary_search_limit">Số kết quả tối đa</label>
            <input type="number" id="vocabulary_search_limit" class="st-chatu8vi-text-input" min="1" max="1000">
        </div>
        <div class="st-chatu8vi-field">
            <label for="vocabulary_search_sort">Cách sắp xếp</label>
            <select id="vocabulary_search_sort" class="st-chatu8vi-select">
                <option value="hot_asc">Theo độ hot tăng dần</option>
                <option value="hot_desc">Theo độ hot giảm dần</option>
                <option value="key_asc">Theo tên tiếng Anh tăng dần</option>
            </select>
        </div>
    </div>
    <div class="st-chatu8vi-settings-section">
        <h3>Kiểm tra</h3>
        <div class="st-chatu8vi-field">
            <label for="vocabulary-search-input">Tìm kiếm</label>
            <div class="st-chatu8vi-input-group">
                <input type="text" id="vocabulary-search-input" class="st-chatu8vi-text-input" placeholder="Nhập từ khóa...">
                <button id="vocabulary-search-btn" class="st-chatu8vi-btn">Tìm kiếm</button>
            </div>
        </div>
        <div class="st-chatu8vi-field-col">
            <label>Kết quả tìm kiếm</label>
            <div id="vocabulary-search-results" class="st-chatu8vi-textarea" style="height: 150px; overflow-y: auto;"></div>
        </div>
    </div>
</div>
