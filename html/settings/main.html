<div id="ch-tab-main">
    <div class="st-chatu8vi-settings-section">
        <h3>Cài đặt chính</h3>
        <div class="st-chatu8vi-field">
            <label for="scriptEnabled">Bật plugin</label>
            <div class="st-chatu8vi-toggle">
                <input id="scriptEnabled" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label for="helpTipsEnabled">Gợi ý giải đáp mục cài đặt</label>
            <div class="st-chatu8vi-toggle">
                <input id="helpTipsEnabled" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label for="mode">Chế độ</label>
            <select id="mode" class="st-chatu8vi-select">
                <option value="sd">SD</option>
                <option value="novelai">NovelAI</option>
                <option value="comfyui">ComfyUI</option>
                <option value="banana">Banana/Grok</option>
            </select>
        </div>
        <div class="st-chatu8vi-field">
            <label for="client">Client</label>
            <select id="client" class="st-chatu8vi-select">
                <option value="browser">Trình duyệt</option>
                <option value="jiuguan">SillyTavern</option>
            </select>
        </div>
        <div class="st-chatu8vi-field">
            <label for="dbclike">Nút ẩn (kích hoạt bằng double-click ảnh)</label>
            <div class="st-chatu8vi-toggle">
                <input id="dbclike" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label for="collapseImage">Thu gọn ảnh</label>
            <div class="st-chatu8vi-toggle">
                <input id="collapseImage" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label for="zidongdianji">Tự click tạo</label>
            <div class="st-chatu8vi-toggle">
                <input id="zidongdianji" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label for="zidongdianji2">Tự click (đừng bật nếu không cần)</label>
            <div class="st-chatu8vi-toggle">
                <input id="zidongdianji2" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label for="longPressToEdit">Nhấn giữ ảnh để sửa tag</label>
            <div class="st-chatu8vi-toggle">
                <input id="longPressToEdit" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label for="clickToPreview">Click ảnh để xem trước</label>
            <div class="st-chatu8vi-toggle">
                <input id="clickToPreview" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label for="newlineFixEnabled">Sửa xuống dòng</label>
            <div class="st-chatu8vi-toggle">
                <input id="newlineFixEnabled" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label for="enablePregen">Bật tạo trước luồng (stream)</label>
            <div class="st-chatu8vi-toggle">
                <input id="enablePregen" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label for="autoLLMImageGen">Tự LLM yêu cầu tạo ảnh (khác tầng)</label>
            <div class="st-chatu8vi-toggle">
                <input id="autoLLMImageGen" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label for="randomYushe">Preset prompt ngẫu nhiên</label>
            <div class="st-chatu8vi-toggle">
                <input id="randomYushe" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label for="aiAutonomousResolution">Độ phân giải tự động AI</label>
            <div class="st-chatu8vi-toggle">
                <input id="aiAutonomousResolution" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label for="imageGenInterval">Thời gian giãn tạo ảnh (ms)</label>
            <input type="number" id="imageGenInterval" class="st-chatu8vi-text-input" min="0" step="100" placeholder="0">
        </div>

        <div class="st-chatu8vi-field">
            <label for="imageAlignment">Căn chỉnh ảnh</label>
            <select id="imageAlignment" class="st-chatu8vi-select">
                <option value="left">Trái</option>
                <option value="center">Giữa</option>
                <option value="right">Phải</option>
            </select>
        </div>
        <div class="st-chatu8vi-field">
            <label for="imageSizeScale">Kích thước hiển thị ảnh</label>
            <select id="imageSizeScale" class="st-chatu8vi-select">
                <option value="100">Tự thích ứng (100%)</option>
                <option value="75">3/4 (75%)</option>
                <option value="50">1/2 (50%)</option>
                <option value="25">1/4 (25%)</option>
            </select>
        </div>
    </div>
    <div class="st-chatu8vi-settings-section">
        <h3>Đánh dấu (Markers)</h3>
        <div class="st-chatu8vi-field">
            <label for="startTag">Marker bắt đầu</label>
            <input type="text" id="startTag" class="st-chatu8vi-text-input">
        </div>
        <div class="st-chatu8vi-field">
            <label for="endTag">Marker kết thúc</label>
            <input type="text" id="endTag" class="st-chatu8vi-text-input">
        </div>
    </div>
    <div class="st-chatu8vi-settings-section">
        <h3>Chế độ lưu tag</h3>
        <div class="st-chatu8vi-field">
            <label for="insertOriginalText">Chèn văn bản gốc (khác tầng)</label>
            <div class="st-chatu8vi-toggle">
                <input id="insertOriginalText" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
    </div>
    <div class="st-chatu8vi-settings-section">
        <h3>Quản lý cache (click nút bên dưới để xóa)</h3>
        <div class="st-chatu8vi-field">
            <label for="cache">Cache cần xóa</label>
            <select id="cache" class="st-chatu8vi-select">
                <option value="0">Không cache nữa</option>
                <option value="1">Xóa dữ liệu 1 ngày trước</option>
                <option value="7">Xóa dữ liệu 1 tuần trước</option>
                <option value="30">Xóa dữ liệu 1 tháng trước</option>
                <option value="365">Xóa dữ liệu 1 năm trước</option>
            </select>
        </div>
        <div class="st-chatu8vi-field">
            <label for="jiuguanchucun">Cache ảnh vào SillyTavern</label>
            <div class="st-chatu8vi-toggle">
                <input id="jiuguanchucun" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label for="vibeJiuguanchucun">Cache Vibe vào SillyTavern</label>
            <div class="st-chatu8vi-toggle">
                <input id="vibeJiuguanchucun" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label for="convertToJpegStorage">Chuyển JPEG để tiết kiệm 70% dung lượng (nhiễu tăng rõ)</label>
            <div class="st-chatu8vi-toggle">
                <input id="convertToJpegStorage" type="checkbox"/>
                <span class="st-chatu8vi-slider"></span>
            </div>
        </div>
        <div class="st-chatu8vi-field">
            <label>Thao tác</label>
            <div>
                <button id="sync-server-images-btn" class="st-chatu8vi-btn">Đồng bộ ảnh máy chủ</button>
                <button id="migrate-vibe-storage-btn" class="st-chatu8vi-btn">Chuyển Vibe sang SillyTavern</button>
                <button id="Clear-Cache" class="st-chatu8vi-btn danger">Xóa cache ảnh</button>
                <button id="migrate-database-btn" class="st-chatu8vi-btn">Di chuyển dữ liệu</button>
            </div>
        </div>
    </div>
</div>
