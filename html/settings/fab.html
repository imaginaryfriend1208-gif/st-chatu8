<div id="ch-tab-fab">
    <div class="st-chatu8-settings-section">
        <h3>Cài đặt nút nổi</h3>
        <div class="st-chatu8-field">
            <label for="enable_chatu8_fab">Bật nút nổi</label>
            <div class="st-chatu8-toggle">
                <input id="enable_chatu8_fab" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="enable_chatu8_fab_video">Bật hình ảnh video</label>
            <div class="st-chatu8-toggle">
                <input id="enable_chatu8_fab_video" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
        </div>
        <div class="st-chatu8-field" id="fab-desktop-pet-settings">
            <label for="enable_chatu8_desktop_pet">Cửa sổ riêng 智绘姬</label>
            <div class="st-chatu8-toggle">
                <input id="enable_chatu8_desktop_pet" type="checkbox"/>
                <span class="st-chatu8-slider"></span>
            </div>
            <p class="st-chatu8-hint" style="font-size: 12px; color: #888; margin-top: 4px;">
                Đưa nhân vật 智绘姬 ra cửa sổ nhỏ picture-in-picture, luôn hiển thị trên cùng các ứng dụng khác (chỉ xem, không tương tác)
            </p>
        </div>
        <div class="st-chatu8-field" id="fab-traditional-settings">
            <div class="st-chatu8-field">
                <label for="chatu8_fab_theme">Preset giao diện</label>
                <select id="chatu8_fab_theme" class="st-chatu8-select">
                    <!-- Các tùy chọn sẽ được JS điền động -->
                </select>
            </div>
            <div class="st-chatu8-field">
                <label for="chatu8_fab_bg_color">Màu nền</label>
                <input type="color" id="chatu8_fab_bg_color" class="st-chatu8-color-picker">
            </div>
            <div class="st-chatu8-field">
                <label for="chatu8_fab_icon_color">Màu icon</label>
                <input type="color" id="chatu8_fab_icon_color" class="st-chatu8-color-picker">
            </div>
            <div class="st-chatu8-field">
                <label>Icon tùy chỉnh</label>
                <div class="st-chatu8-fab-icon-config">
                    <div id="chatu8_fab_icon_preview" class="st-chatu8-fab-icon-preview">
                        <i class="fa-solid fa-paintbrush"></i>
                        <img id="chatu8_fab_icon_preview_img" alt="Xem trước icon nút nổi">
                    </div>
                    <div class="st-chatu8-fab-icon-actions">
                        <input type="file" id="chatu8_fab_icon_upload_input" accept="image/png,image/jpeg,image/webp,image/gif" style="display: none;">
                        <button id="chatu8_fab_icon_upload_btn" class="st-chatu8-btn" type="button">
                            <i class="fa-solid fa-upload"></i> Tải ảnh lên
                        </button>
                        <button id="chatu8_fab_icon_remove_btn" class="st-chatu8-btn danger" type="button" style="display: none;">
                            <i class="fa-solid fa-rotate-left"></i> Khôi phục mặc định
                        </button>
                        <small>Ảnh sẽ được lưu vào SillyTavern</small>
                    </div>
                </div>
            </div>
            <div class="st-chatu8-field">
                <label for="chatu8_fab_opacity">Độ mờ</label>
                <div class="st-chatu8-range-container">
                    <input type="range" id="chatu8_fab_opacity" class="st-chatu8-range-slider" min="0" max="1" step="0.1">
                    <input type="number" id="chatu8_fab_opacity_value" class="st-chatu8-range-input" min="0" max="1" step="0.1">
                </div>
            </div>
        </div>
        <div class="st-chatu8-field">
            <label for="chatu8_fab_size">Kích thước</label>
            <div class="st-chatu8-range-container">
                <input type="range" id="chatu8_fab_size" class="st-chatu8-range-slider" min="30" max="1000" step="1">
                <input type="number" id="chatu8_fab_size_value" class="st-chatu8-range-input" min="30" max="1000" step="1">
            </div>
        </div>
        <div class="st-chatu8-field">
            <label>Điều khiển vị trí</label>
            <button id="chatu8_fab_reset_position" class="st-chatu8-btn">Đặt lại về giữa màn hình</button>
        </div>
    </div>
</div>
