<div id="ch-tab-image-cache">
    <div class="st-chatu8-settings-section">
        <h3>Quản lý bộ nhớ ảnh</h3>
        <div class="st-chatu8-cache-controls">
            <button id="image-cache-toggle-multiselect" class="st-chatu8-btn">Chọn nhiều</button>
            <button id="image-cache-select-all" class="st-chatu8-btn">Chọn tất cả</button>
            <button id="image-cache-deselect-all" class="st-chatu8-btn">Bỏ chọn tất cả</button>
            <button id="image-cache-download-selected" class="st-chatu8-btn"><i class="fa-solid fa-download"></i> Tải mục chọn</button>
            <button id="image-cache-delete-selected" class="st-chatu8-btn danger"><i class="fa-solid fa-trash"></i> Xóa mục chọn</button>
        </div>
        <div id="image-cache-grid" class="st-chatu8-image-cache-grid">
            <!-- Các ảnh sẽ được tải ở đây -->
        </div>
        <div id="image-cache-pagination" class="st-chatu8-pagination">
            <!-- Điều khiển phân trang sẽ ở đây -->
            <div class="st-chatu8-field" id="image-cache-jump-container" style="display: none; margin-left: 10px;">
                <label for="image-cache-jump-input">Chuyển đến</label>
                <div class="st-chatu8-input-group">
                    <input type="number" id="image-cache-jump-input" class="st-chatu8-page-jump-input" placeholder="Số trang" min="1">
                    <button id="image-cache-jump-button" class="st-chatu8-btn">Chuyển</button>
                </div>
            </div>
        </div>
        <div id="image-cache-info" class="st-chatu8-cache-info"></div>
    </div>
</div>
