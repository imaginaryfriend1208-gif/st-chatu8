<div id="st-chatu8-summary-manager" class="st-chatu8-summary-manager" style="display:none;">
    <!-- Thanh công cụ trên -->
    <div class="summary-toolbar">
        <div class="summary-toolbar-left">
            <span class="summary-title"><i class="fa-solid fa-layer-group"></i> Tóm tắt trò chuyện</span>
        </div>
        <div class="summary-toolbar-actions">
            <button id="summary-toggle-multiselect" class="summary-btn summary-btn--outline" title="Bật chế độ chọn nhiều">
                <i class="fa-solid fa-check-double"></i> Chọn nhiều
            </button>
            <button id="summary-generate-selected-btn" class="summary-btn summary-btn--primary" disabled title="Tạo tóm tắt gộp cho mục đã chọn">
                <i class="fa-solid fa-compress-alt"></i> Tóm tắt mục chọn
            </button>
            <button id="summary-enable-selected-btn" class="summary-btn summary-btn--success" disabled title="Bật tóm tắt đã chọn">
                <i class="fa-solid fa-check"></i> Bật
            </button>
            <button id="summary-disable-selected-btn" class="summary-btn summary-btn--warning" disabled title="Hủy bật tóm tắt đã chọn">
                <i class="fa-solid fa-times"></i> Tắt
            </button>
        </div>
        <button id="summary-close-btn" class="summary-btn summary-btn--icon" title="Đóng">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <!-- Thanh trạng thái -->
    <div id="summary-status-bar" class="summary-status-bar" style="display:none;"></div>

    <!-- Phần chính: container cuộn ngang -->
    <div class="summary-body">
        <div class="summary-columns" id="summary-columns">
            <!-- Lớp đường nối SVG (định vị tuyệt đối, cuộn theo cột) -->
            <svg class="summary-svg-lines" id="summary-svg-lines" xmlns="http://www.w3.org/2000/svg"></svg>
            <!-- JS tạo cột động theo cấp độ -->
        </div>
    </div>

    <!-- Gợi ý dưới -->
    <div class="summary-footer">
        <span id="summary-enabled-hint" class="summary-enabled-hint"></span>
        <span id="summary-total-tokens" class="summary-total-tokens"></span>
        <span class="summary-footer-tip">Mẹo: tóm tắt đã bật sẽ thay thế lịch sử trò chuyện của vòng tương ứng gửi cho AI (luôn giữ 15 vòng gần nhất)</span>
    </div>
</div>
